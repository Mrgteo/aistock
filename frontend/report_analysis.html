<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 研报分析</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
      --active-bg: #eff6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 18px; font-weight: 600; }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* 左侧导航 */
    .left-nav {
      width: 200px;
      min-width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 0;
    }
    .nav-item {
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: #f8fafc; color: var(--text-main); }
    .nav-item.active { background: var(--active-bg); color: var(--primary); border-left-color: var(--primary); }
    .nav-item .icon { font-size: 16px; }

    /* 右侧内容区 */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    .page-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 16px; font-weight: 600; }
    .page-header .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .page-header-left { flex: 1; }

    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    /* 卡片 */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }

    /* 上传区域 */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafbfc;
      margin-bottom: 16px;
    }
    .upload-zone:hover { border-color: var(--primary); background: var(--active-bg); }
    .upload-zone.dragover { border-color: var(--primary); background: var(--active-bg); }
    .upload-zone .icon { font-size: 36px; margin-bottom: 10px; }
    .upload-zone p { font-size: 13px; color: var(--text-muted); }
    .upload-zone .formats { font-size: 11px; margin-top: 4px; }
    .upload-zone.has-file { border-color: var(--success); background: #f0fdf4; }
    .upload-zone.has-file .icon { color: var(--success); }

    /* 表单 */
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-group label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    input[type="text"], select {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      background: #f8fafc;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    /* 按钮 */
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; border: 1px solid var(--border); color: var(--text-main); }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }

    /* 历史列表 */
    .history-item {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    .history-item:hover { border-color: var(--primary); background: #f8fafc; }
    .history-item .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .history-item .title { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .history-item .summary { font-size: 11px; color: var(--text-muted); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .actions { display: flex; gap: 6px; margin-top: 8px; }
    .history-item .actions .btn { padding: 4px 10px; font-size: 11px; border-radius: 4px; }

    /* 分析结果 */
    .result-section { margin-bottom: 16px; }
    .result-section:last-child { margin-bottom: 0; }
    .result-section h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .stock-list, .industry-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .stock-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 500;
      background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af;
    }
    .stock-tag.bullish { background: #d1fae5; border-color: #6ee7b7; color: #065f46; }
    .stock-tag.bearish { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
    .industry-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 6px; font-size: 12px;
      background: #faf5ff; border: 1px solid #e9d5ff; color: #6b21a8;
    }
    .sentiment { font-size: 10px; padding: 2px 5px; border-radius: 3px; }
    .sentiment.positive { background: #d1fae5; color: #065f46; }
    .sentiment.neutral { background: #f1f5f9; color: #475569; }
    .sentiment.negative { background: #fee2e2; color: #991b1b; }

    .ai-analysis {
      background: #f8fafc;
      border-radius: 6px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
      overflow-y: auto;
    }
    .ai-analysis-content {
      color: #334155;
    }
    .ai-analysis-content h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      margin: 24px 0 16px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #e2e8f0;
      line-height: 1.4;
    }
    .ai-analysis-content h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1e40af;
      margin: 22px 0 12px 0;
      padding-bottom: 6px;
      border-bottom: 1px solid #bfdbfe;
      line-height: 1.4;
    }
    .ai-analysis-content h3 {
      font-size: 15px;
      font-weight: 600;
      color: #1e40af;
      margin: 18px 0 10px 0;
      line-height: 1.4;
    }
    .ai-analysis-content h4 {
      font-size: 14px;
      font-weight: 600;
      color: #3730a3;
      margin: 14px 0 8px 0;
      line-height: 1.4;
    }
    .ai-analysis-content p {
      margin: 0 0 14px 0;
      line-height: 2;
      color: #374151;
    }
    .ai-analysis-content strong, .ai-analysis-content b {
      font-weight: 700;
      color: #1e293b;
    }
    .ai-analysis-content em, .ai-analysis-content i {
      font-style: italic;
      color: #475569;
    }
    .ai-analysis-content ul, .ai-analysis-content ol {
      margin: 10px 0 14px 0;
      padding-left: 24px;
    }
    .ai-analysis-content li {
      margin-bottom: 8px;
      line-height: 1.8;
      color: #374151;
    }
    .ai-analysis-content ul li::marker {
      color: #2563eb;
    }
    .ai-analysis-content ol li::marker {
      color: #2563eb;
      font-weight: 600;
    }
    .ai-analysis-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13px;
      overflow-x: auto;
      display: block;
    }
    .ai-analysis-content thead {
      background: #eff6ff;
    }
    .ai-analysis-content th {
      background: #dbeafe;
      color: #1e293b;
      font-weight: 600;
      padding: 10px 12px;
      text-align: left;
      border: 1px solid #93c5fd;
    }
    .ai-analysis-content td {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      color: #334155;
    }
    .ai-analysis-content tr:nth-child(even) td {
      background: #f8fafc;
    }
    .ai-analysis-content tr:hover td {
      background: #f0f9ff;
    }
    .ai-analysis-content hr {
      border: none;
      border-top: 2px solid #e2e8f0;
      margin: 20px 0;
    }
    .ai-analysis-content blockquote {
      margin: 14px 0;
      padding: 12px 16px;
      background: #fefce8;
      border-left: 4px solid #f59e0b;
      border-radius: 0 4px 4px 0;
      color: #57534e;
      font-style: italic;
      line-height: 1.8;
    }
    .ai-analysis .sources {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* 状态 */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--text-muted);
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state h3 { font-size: 14px; color: var(--text-main); margin-bottom: 6px; }

    /* 返回按钮 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { background: #e2e8f0; }

    /* 详情头部 */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .detail-title {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
    }

    /* 知识库 */
    .kb-card {
      padding: 14px;
      background: #f8fafc;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .kb-card:last-child { margin-bottom: 0; }
    .kb-card .name { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .kb-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .kb-tag {
      padding: 2px 6px;
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 3px;
      font-size: 10px;
    }
    .kb-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .kb-status.indexed { background: #d1fae5; color: #065f46; }
    .kb-status.processing { background: #fef3c7; color: #92400e; }
    .kb-status.uploaded, .kb-status.failed { background: #fee2e2; color: #991b1b; }

    /* 知识库查看器Modal */
    .kb-viewer-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .kb-viewer-modal .viewer-content {
      width: 90%; height: 85%; max-width: 1200px;
      background: white; border-radius: 12px; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .kb-viewer-modal .viewer-header {
      padding: 16px 20px; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between;
      background: #f8fafc;
    }
    .kb-viewer-modal .viewer-header h3 { font-size: 15px; font-weight: 600; }
    .kb-viewer-modal .viewer-header .close-btn {
      width: 32px; height: 32px; border-radius: 6px; border: none;
      background: #fee2e2; color: #dc2626; cursor: pointer; font-size: 18px;
    }
    .kb-viewer-modal .viewer-body {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }
    .kb-viewer-modal .viewer-left, .kb-viewer-modal .viewer-right {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100%;
    }
    .kb-viewer-modal .viewer-left { border-right: 1px solid #e2e8f0; }
    .kb-viewer-modal .viewer-panel-header {
      padding: 10px 16px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
      font-size: 12px; font-weight: 600; color: #64748b;
    }
    .kb-viewer-modal .viewer-panel-content {
      flex: 1; overflow-y: auto; padding: 16px;
    }
    .kb-viewer-modal .viewer-left .viewer-panel-content {
      padding: 0;
      font-size: 13px; line-height: 1.8; white-space: pre-wrap;
      background: #fafafa; overflow: hidden;
    }
    .kb-viewer-modal .chunk-item {
      padding: 12px; background: white; border: 1px solid #e2e8f0;
      border-radius: 6px; margin-bottom: 10px;
    }
    .kb-viewer-modal .chunk-item .chunk-meta {
      font-size: 11px; color: #94a3b8; margin-bottom: 6px;
    }
    .kb-viewer-modal .chunk-item .chunk-text {
      font-size: 13px; color: #334155; line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    /* QA页面滚动条样式 */
    #qaChatList::-webkit-scrollbar,
    #qaMessages::-webkit-scrollbar { width: 6px; }
    #qaChatList::-webkit-scrollbar-track,
    #qaMessages::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
    #qaChatList::-webkit-scrollbar-thumb,
    #qaMessages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    #qaChatList::-webkit-scrollbar-thumb:hover,
    #qaMessages::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* 返回顶部按钮 */
    .back-to-top-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      z-index: 100;
      transition: all 0.2s;
    }
    .back-to-top-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    /* 问答样式 */
    .qa-reference-item {
      padding: 12px;
      background: #f8fafc;
      border-radius: 6px;
      margin-bottom: 8px;
      border-left: 3px solid #2563eb;
    }
    .qa-reference-item:last-child { margin-bottom: 0; }
    .qa-reference-item .ref-title { font-size: 13px; font-weight: 500; color: #1e40af; margin-bottom: 4px; }
    .qa-reference-item .ref-content { font-size: 12px; color: #64748b; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .qa-reference-item .ref-meta { font-size: 11px; color: #94a3b8; margin-top: 6px; }
    .qa-answer-text { line-height: 1.8; }
    .qa-answer-text p { margin-bottom: 12px; }
    .qa-chat-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .qa-chat-bubble.user {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
    }
    .qa-chat-bubble.ai {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #334155;
    }
    .qa-history-item {
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .qa-history-item:hover {
      border-color: #2563eb;
      background: #f8fafc;
    }
    .qa-history-item .q { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .qa-history-item .time { font-size: 11px; color: #94a3b8; }

    /* 聊天消息样式 */
    .chat-container { display: flex; flex-direction: column; gap: 16px; }
    .chat-message { display: flex; gap: 12px; align-items: flex-start; }
    .chat-message.user { flex-direction: row-reverse; }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .chat-message.ai .chat-avatar { background: #eff6ff; border: 1px solid #bfdbfe; }
    .chat-message.user .chat-avatar { background: #fef3c7; border: 1px solid #fcd34d; }
    .chat-bubble {
      max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7;
    }
    .chat-message.ai .chat-bubble { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 4px 12px 12px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .chat-message.user .chat-bubble { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border-radius: 12px 4px 12px 12px; box-shadow: 0 1px 4px rgba(37,99,235,0.3); margin-left: auto; }
    .chat-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .chat-message.user .chat-content { align-items: flex-end; }
    .chat-time { font-size: 11px; color: #94a3b8; margin-top: 4px; padding: 0 4px; }
    .chat-message.user .chat-time { color: #93c5fd; }
    .chat-loading { display: flex; align-items: center; gap: 8px; color: #64748b; font-size: 13px; padding: 8px 0; }
    .chat-ref-item {
      padding: 10px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
      margin-bottom: 6px; transition: all 0.2s; cursor: pointer;
    }
    .chat-ref-item:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .chat-ref-item:last-child { margin-bottom: 0; }
    .chat-ref-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .chat-ref-title { font-size: 12px; font-weight: 500; color: #1e40af; flex: 1; }
    .chat-ref-score { font-size: 10px; color: #64748b; background: #e2e8f0; padding: 2px 6px; border-radius: 10px; }
    .chat-ref-content {
      font-size: 11px; color: #475569; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; transition: max-height 0.2s;
    }
    .chat-ref-content.expanded { display: block; -webkit-line-clamp: unset; overflow: visible; max-height: none; }
    .chat-ref-footer { font-size: 10px; color: #94a3b8; margin-top: 4px; }
    .chat-ref-chunk-id { font-family: monospace; }
    /* AI回复内的参考资料折叠 - 使用max-height过渡防止位移 */
    .chat-refs-toggle {
      display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b;
      cursor: pointer; margin-top: 8px; padding: 3px 8px; background: #f1f5f9; border-radius: 4px;
      border: 1px solid #e2e8f0; transition: all 0.2s;
    }
    .chat-refs-toggle:hover { background: #e2e8f0; color: #334155; }
    .chat-refs-list {
      margin-top: 6px; text-align: left;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .chat-refs-list.expanded { max-height: 1000px; }
    .chat-refs-list .chat-ref-item .chat-ref-content { display: block; -webkit-line-clamp: 3; overflow: visible; }
    /* Markdown渲染样式 */
    .chat-bubble p { margin: 0 0 8px 0; }
    .chat-bubble p:last-child { margin-bottom: 0; }
    .chat-bubble ul, .chat-bubble ol { margin: 0 0 8px 0; padding-left: 20px; }
    .chat-bubble li { margin-bottom: 4px; }
    .chat-bubble strong { font-weight: 600; }
    .chat-bubble em { font-style: italic; }
    .chat-bubble code { background: #f1f5f9; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
    .qa-session-item {
      padding: 10px 12px; border-radius: 6px; margin-bottom: 6px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.2s; position: relative;
    }
    .qa-session-item:hover { background: white; border-color: #e2e8f0; }
    .qa-session-item.active { background: white; border-color: #2563eb; box-shadow: 0 1px 3px rgba(37,99,235,0.1); }
    .qa-session-item .session-title { font-size: 13px; font-weight: 500; color: #0f172a; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 20px; }
    .qa-session-item .session-time { font-size: 11px; color: #94a3b8; }
    .qa-session-item .session-delete {
      position: absolute; top: 8px; right: 8px; width: 18px; height: 18px;
      border-radius: 50%; background: #ef4444; color: white; border: none;
      font-size: 12px; line-height: 18px; text-align: center; cursor: pointer;
      opacity: 0; transition: opacity 0.2s;
    }
    .qa-session-item:hover .session-delete { opacity: 1; }
    .qa-session-item .session-delete:hover { background: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI 研报分析</h1>
  </div>

  <div class="main-container">
    <!-- 左侧导航 -->
    <div class="left-nav">
      <div class="nav-item active" onclick="switchPage('upload')" id="nav-upload">
        <span class="icon">📤</span>
        <span>上传分析</span>
      </div>
      <div class="nav-item" onclick="switchPage('history')" id="nav-history">
        <span class="icon">📜</span>
        <span>分析历史</span>
      </div>
      <div class="nav-item" onclick="switchPage('qa')" id="nav-qa">
        <span class="icon">🤖</span>
        <span>AI研报问答</span>
      </div>
      <div class="nav-item" onclick="switchPage('knowledge')" id="nav-knowledge">
        <span class="icon">📚</span>
        <span>知识库</span>
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div id="right-panel" class="right-panel">
      <!-- 上传分析页面 -->
      <div id="page-upload" class="page" style="height: 100%; overflow: auto;">
        <div class="page-header">
          <div class="page-header-left">
            <h2>上传研报并分析</h2>
            <p class="desc">上传研报文件，AI 将自动分析涉及的 A 股标的和行业</p>
          </div>
        </div>
        <div class="page-content">
          <!-- 上传区域 -->
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="icon" id="uploadIcon">📄</div>
            <p id="uploadText">拖拽文件到此处或点击选择</p>
            <p class="formats" id="uploadFormats">支持 PDF、DOCX、TXT 格式</p>
          </div>
          <input type="file" id="fileInput" style="display:none" accept=".pdf,.docx,.doc,.txt" onchange="handleFileSelect(this.files[0])">

          <!-- 分析按钮 -->
          <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalyze()" style="width: 100%; margin-top: 16px;" disabled>
            开始分析
          </button>

          <!-- 分析结果（在同一页面滚动查看） -->
          <div id="analysisResult" style="display:none; margin-top: 16px;"></div>

          <!-- 返回顶部按钮 -->
          <button id="backToTopBtn" class="back-to-top-btn" onclick="scrollToTop()" style="display:none;">
            ↑ 返回顶部
          </button>
        </div>
      </div>

      <!-- 分析历史页面 -->
      <div id="page-history" class="page" style="display:none; height: 100%; overflow: auto;">
        <!-- 历史列表视图 -->
        <div id="historyListView">
          <div class="page-header">
            <div class="page-header-left">
              <h2>分析历史</h2>
              <p class="desc">查看历史分析记录</p>
            </div>
          </div>
          <div class="page-content" id="historyListContent">
            <div id="historyList"></div>
          </div>
        </div>

        <!-- 历史详情视图 -->
        <div id="historyDetailView" style="display:none;">
          <div class="page-header">
            <button class="back-btn" onclick="backToHistoryList()">← 返回列表</button>
          </div>
          <div class="page-content" id="historyDetailContent"></div>
        </div>
      </div>

      <!-- AI研报问答页面 - 左右两栏布局 -->
      <div id="page-qa" class="page" style="display:none; height: 100%; overflow: hidden; flex-shrink: 0;">
        <div style="display: flex; height: 100%; overflow: hidden; flex: 1;">
          <!-- 左侧会话记录栏 -->
          <div style="width: 220px; min-width: 220px; background: #f8fafc; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; height: 100%; overflow: hidden;">
            <div style="padding: 16px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0;">
              <button class="btn btn-primary" onclick="createNewQAChat()" style="width: 100%;">
                + 新建会话
              </button>
            </div>
            <div id="qaChatList" style="flex: 1; overflow-y: auto; padding: 12px; min-height: 0;">
              <!-- 会话列表由JS渲染 -->
            </div>
          </div>

          <!-- 右侧聊天对话栏 -->
          <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100%;">
            <!-- 聊天消息区域 -->
            <div id="qaMessages" style="flex: 1; overflow-y: auto; padding: 20px; min-height: 0;">
              <!-- 空状态 -->
              <div id="qaEmptyState" style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b;">
                <div style="font-size: 48px; margin-bottom: 16px;">🤖</div>
                <h3 style="font-size: 16px; color: #0f172a; margin-bottom: 8px;">AI 研报问答</h3>
                <p style="font-size: 13px;">基于知识库向AI提问，获取智能回答</p>
              </div>
              <!-- 消息列表 -->
              <div id="qaMessagesList" style="display: none;"></div>
            </div>

            <!-- 输入区域 -->
            <div style="padding: 16px 20px; border-top: 1px solid #e2e8f0; background: white; flex-shrink: 0;">
              <div style="display: flex; gap: 10px; align-items: flex-end;">
                <textarea id="qaQuestion" rows="2" placeholder="输入问题..." style="flex: 1; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; resize: none; font-family: inherit;" onkeydown="handleQAKeyDown(event)"></textarea>
                <button class="btn btn-primary" id="qaSubmitBtn" onclick="submitQuestion()" style="padding: 10px 24px;">
                  发送
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 知识库页面 -->
      <div id="page-knowledge" class="page" style="display:none; height: 100%; overflow: auto;">
        <div class="page-header">
          <div class="page-header-left">
            <h2>知识库管理</h2>
            <p class="desc">上传参考文档提升分析准确性</p>
          </div>
          <button class="btn btn-secondary" onclick="document.getElementById('kbFileInput').click()">
            + 添加文件
          </button>
          <input type="file" id="kbFileInput" style="display:none" accept=".pdf,.docx,.doc,.txt" onchange="uploadKnowledgeFile(this.files[0])">
        </div>
        <div class="page-content" id="kbListContent">
          <div id="kbList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8017';
    let currentPage = 'upload';
    let selectedFile = null;
    let analysisHistory = [];
    let kbList = [];

    // ========== 页面切换 ==========
    function switchPage(page) {
      currentPage = page;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + page).classList.add('active');
      document.querySelectorAll('.page').forEach(el => el.style.display = 'none');

      const pageEl = document.getElementById('page-' + page);
      const rightPanel = document.getElementById('right-panel');

      if (page === 'qa') {
        pageEl.style.display = 'flex';
        pageEl.style.height = '100%';
        if (rightPanel) rightPanel.style.overflow = 'hidden';
      } else {
        pageEl.style.display = 'flex';
        pageEl.style.flexDirection = 'column';
        if (rightPanel) {
          rightPanel.style.overflow = 'auto';
          rightPanel.style.height = '100%';
        }
      }

      if (page === 'history') {
        loadAnalysisHistory();
        backToHistoryList();
      }
      if (page === 'knowledge') loadKnowledge();
      if (page === 'qa') {
        initQAChat();
      }
    }

    // ========== AI研报问答 ==========
    let qaSessions = [];
    let currentQASessionId = null;
    let qaMessages = [];

    function initQAChat() {
      loadQASessions();
    }

    async function loadQASessions() {
      try {
        const res = await fetch(`${API_BASE}/api/report/qa/sessions`);
        const data = await res.json();
        if (data.success && data.sessions) {
          qaSessions = data.sessions.map(s => ({
            id: s.session_id,
            session_id: s.session_id,
            title: s.title,
            time: s.updated_at ? new Date(s.updated_at).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '',
            messages: s.messages || []
          }));
        } else {
          qaSessions = [];
        }
      } catch (e) {
        console.error('加载会话失败:', e);
        qaSessions = [];
      }
      renderQASessions();
    }

    async function saveQASessionToServer(session) {
      try {
        await fetch(`${API_BASE}/api/report/qa/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: session.id || session.session_id,
            title: session.title,
            messages: session.messages,
            updated_at: new Date().toISOString()
          })
        });
      } catch (e) {
        console.error('保存会话失败:', e);
      }
    }

    function createNewQAChat() {
      const session = {
        id: Date.now().toString(),
        title: '新会话',
        time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
        messages: []
      };
      qaSessions.unshift(session);
      saveQASessionToServer(session);
      renderQASessions();
      selectQASession(session.id);
    }

    function renderQASessions() {
      const container = document.getElementById('qaChatList');
      if (!container) return;

      if (qaSessions.length === 0) {
        container.innerHTML = '<div style="text-align: center; color: #94a3b8; font-size: 12px; padding: 20px;">暂无会话记录</div>';
        return;
      }

      container.innerHTML = qaSessions.map(s => `
        <div class="qa-session-item ${s.id === currentQASessionId || s.session_id === currentQASessionId ? 'active' : ''}" onclick="selectQASession('${s.id || s.session_id}')">
          <button class="session-delete" onclick="event.stopPropagation(); deleteQASession('${s.id || s.session_id}')">×</button>
          <div class="session-title">${escapeHtml(s.title)}</div>
          <div class="session-time">${s.time}</div>
        </div>
      `).join('');
    }

    async function deleteQASession(id) {
      try {
        await fetch(`${API_BASE}/api/report/qa/sessions/${id}`, { method: 'DELETE' });
      } catch (e) {
        console.error('删除会话失败:', e);
      }
      qaSessions = qaSessions.filter(s => (s.id || s.session_id) !== id);
      if (currentQASessionId === id) {
        currentQASessionId = qaSessions.length > 0 ? (qaSessions[0].id || qaSessions[0].session_id) : null;
        qaMessages = [];
        if (currentQASessionId) {
          const session = qaSessions.find(s => (s.id || s.session_id) === currentQASessionId);
          qaMessages = session ? session.messages || [] : [];
        }
      }
      renderQASessions();
      renderQAMessages();
      document.getElementById('qaEmptyState').style.display = qaMessages.length === 0 ? 'flex' : 'none';
      document.getElementById('qaMessagesList').style.display = qaMessages.length > 0 ? 'block' : 'none';
    }

    async function selectQASession(id) {
      currentQASessionId = id;
      const session = qaSessions.find(s => (s.id || s.session_id) === id);
      if (!session) return;

      qaMessages = session.messages || [];
      renderQAMessages();
      renderQASessions();

      document.getElementById('qaEmptyState').style.display = qaMessages.length === 0 ? 'flex' : 'none';
      document.getElementById('qaMessagesList').style.display = qaMessages.length > 0 ? 'block' : 'none';
    }

    function renderQAMessages() {
      const container = document.getElementById('qaMessagesList');
      if (!container) return;

      if (qaMessages.length === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = qaMessages.map((msg, msgIdx) => {
        if (msg.type === 'user') {
          return `
            <div class="chat-message user">
              <div class="chat-avatar">👤</div>
              <div class="chat-content">
                <div class="chat-bubble">${escapeHtml(msg.content)}</div>
                <div class="chat-time">${msg.time}</div>
              </div>
            </div>
          `;
        } else if (msg.type === 'ai') {
          const refsHtml = msg.references && msg.references.length > 0 ? `
            <div class="chat-refs-wrap" id="refs-wrap-${msgIdx}">
              <span class="chat-refs-toggle" onclick="toggleChatRefs(${msgIdx})">
                📖 参考资料 (${msg.references.length}) <span id="refs-arrow-${msgIdx}">▼</span>
              </span>
              <div class="chat-refs-list" id="refs-list-${msgIdx}">
                ${msg.references.map((r, rIdx) => `
                  <div class="chat-ref-item" onclick="toggleRefContent(this, ${msgIdx}, ${rIdx})">
                    <div class="chat-ref-header">
                      <div class="chat-ref-title">📄 ${escapeHtml(r.title || '文档')}</div>
                      ${r.relevance_score ? `<span class="chat-ref-score">${(r.relevance_score * 100).toFixed(0)}%</span>` : ''}
                    </div>
                    <div class="chat-ref-content" id="ref-content-${msgIdx}-${rIdx}">${escapeHtml(r.content || '')}</div>
                    <div class="chat-ref-footer">
                      <span class="chat-ref-chunk-id">ID: ${(r.chunk_id || '').substring(0, 8)}...</span>
                      <span style="margin-left: 8px; color: #94a3b8;">点击${r.content && r.content.length > 80 ? '展开' : '查看'}完整内容</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : '';
          return `
            <div class="chat-message ai">
              <div class="chat-avatar">🤖</div>
              <div class="chat-content">
                <div class="chat-bubble">${renderMarkdown(msg.content)}</div>
                ${refsHtml}
                <div class="chat-time">${msg.time}</div>
              </div>
            </div>
          `;
        } else if (msg.type === 'loading') {
          return `
            <div class="chat-message ai">
              <div class="chat-avatar">🤖</div>
              <div class="chat-content">
                <div class="chat-loading"><div class="spinner"></div>AI思考中...</div>
              </div>
            </div>
          `;
        }
        return '';
      }).join('');

      // 滚动到底部
      const messagesDiv = document.getElementById('qaMessages');
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function toggleChatRefs(msgIdx) {
      const list = document.getElementById('refs-list-' + msgIdx);
      const arrow = document.getElementById('refs-arrow-' + msgIdx);
      if (!list) return;
      if (list.classList.contains('expanded')) {
        list.classList.remove('expanded');
        arrow.textContent = '▼';
        // Collapse all individual refs
        list.querySelectorAll('.chat-ref-content').forEach(el => el.classList.remove('expanded'));
      } else {
        list.classList.add('expanded');
        arrow.textContent = '▲';
      }
    }

    function toggleRefContent(refItem, msgIdx, rIdx) {
      const content = document.getElementById('ref-content-' + msgIdx + '-' + rIdx);
      if (!content) return;
      content.classList.toggle('expanded');
      const footer = refItem.querySelector('.chat-ref-footer span:last-child');
      if (footer) {
        footer.textContent = content.classList.contains('expanded') ? '点击收起' : (content.textContent.length > 80 ? '点击展开完整内容' : '查看完整内容');
      }
    }

    function handleQAKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitQuestion();
      }
    }

    async function submitQuestion() {
      const question = document.getElementById('qaQuestion').value.trim();
      if (!question) return;

      const btn = document.getElementById('qaSubmitBtn');
      btn.disabled = true;
      btn.textContent = '发送中...';

      // 创建新会话如果不存在
      if (!currentQASessionId) {
        createNewQAChat();
      }

      // 找到当前会话
      let session = qaSessions.find(s => (s.id || s.session_id) === currentQASessionId);

      // 添加用户消息
      const userMsg = {
        type: 'user',
        content: question,
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
      };
      qaMessages.push(userMsg);

      // 更新会话标题和时间
      if (session) {
        session.title = question.substring(0, 20) + (question.length > 20 ? '...' : '');
        session.time = new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        session.messages = qaMessages;
        saveQASessionToServer(session);
        renderQASessions();
      }

      // 清空输入框并显示消息
      document.getElementById('qaQuestion').value = '';
      document.getElementById('qaEmptyState').style.display = 'none';
      document.getElementById('qaMessagesList').style.display = 'block';
      renderQAMessages();

      // 添加加载状态
      qaMessages.push({ type: 'loading' });
      renderQAMessages();

      try {
        const topK = 5;
        const res = await fetch(`${API_BASE}/api/report/knowledge/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: question, top_k: topK })
        });
        const data = await res.json();

        // 移除加载状态
        qaMessages = qaMessages.filter(m => m.type !== 'loading');

        if (data.success && data.results && data.results.length > 0) {
          // 构建上下文发送给LLM综合
          const contextText = data.results.map((r, i) =>
            `[参考资料${i + 1}] ${r.content}`
          ).join('\n\n');

          const synthesizeRes = await fetch(`${API_BASE}/api/report/knowledge/synthesize`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              query: question,
              context: contextText,
              references: data.results.map(r => ({
                title: r.title,
                content: r.content,
                relevance_score: r.relevance_score,
                chunk_id: r.chunk_id
              }))
            })
          });
          const synthData = await synthesizeRes.json();

          const aiAnswer = synthData.success ? synthData.answer
            : '抱歉，AI综合回答失败：' + (synthData.detail || '未知错误');

          // 添加AI消息（带内嵌参考资料）
          qaMessages.push({
            type: 'ai',
            content: aiAnswer,
            references: data.results.map(r => ({
              title: r.title,
              content: r.content,
              relevance_score: r.relevance_score,
              chunk_id: r.chunk_id
            })),
            time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
          });
        } else {
          qaMessages.push({
            type: 'ai',
            content: '抱歉，知识库中没有找到相关的内容。您可以先在知识库中上传相关文档，或者换个问题试试。',
            references: [],
            time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
          });
        }

        // 更新会话
        if (session) {
          session.messages = qaMessages;
          saveQASessionToServer(session);
        }

        renderQAMessages();

      } catch (e) {
        qaMessages = qaMessages.filter(m => m.type !== 'loading');
        qaMessages.push({
          type: 'ai',
          content: '抱歉，发生了错误：' + e.message + '。请稍后重试。',
          references: [],
          time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
        });
        if (session) {
          session.messages = qaMessages;
          saveQASessionToServer(session);
        }
        renderQAMessages();
      } finally {
        btn.disabled = false;
        btn.textContent = '发送';
      }
    }

    // 简单的Markdown转HTML函数
    function renderMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/_(.+?)_/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h2>$1</h2>')
        .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
      html = '<p>' + html + '</p>';
      html = html.replace(/(<li>.+?<\/li>)+/g, '<ul>$&</ul>');
      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== 上传分析 ==========
    const uploadZone = document.getElementById('uploadZone');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
      uploadZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
    });
    ['dragenter', 'dragover'].forEach(evt => {
      uploadZone.addEventListener(evt, () => uploadZone.classList.add('dragover'));
    });
    ['dragleave', 'drop'].forEach(evt => {
      uploadZone.addEventListener(evt, () => uploadZone.classList.remove('dragover'));
    });
    uploadZone.addEventListener('drop', e => {
      const file = e.dataTransfer.files[0];
      if (file) handleFileSelect(file);
    });

    function handleFileSelect(file) {
      if (!file) return;
      selectedFile = file;
      uploadZone.classList.add('has-file');

    let currentReportId = null;

    async function autoUpload() {
      if (!selectedFile) return;

      const btn = document.getElementById('analyzeBtn');
      const resultDiv = document.getElementById('analysisResult');

      btn.disabled = true;
      btn.textContent = '上传中...';

      resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>上传研报中...</div>';
      resultDiv.style.display = 'block';

      try {
        // 1. 使用文件名作为临时标题上传（快速返回）
        const tempTitle = selectedFile.name.replace(/\.[^/.]+$/, '');
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('title', tempTitle);
        formData.append('report_type', '行业报告');

        const uploadRes = await fetch(`${API_BASE}/api/report/upload`, {
          method: 'POST',
          body: formData
        });
        const uploadData = await uploadRes.json();

        if (!uploadData.success) {
          throw new Error(uploadData.detail || '上传失败');
        }

        currentReportId = uploadData.report_id;

        // 2. 立即启用分析按钮，不等待后台处理
        btn.disabled = false;
        btn.textContent = '开始分析';
        resultDiv.innerHTML = '<div class="card"><div class="empty-state"><div class="icon">✅</div><h3>上传成功</h3><p>点击"开始分析"进行AI分析</p></div></div>';
      } catch (e) {
        resultDiv.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">❌</div><h3>上传失败</h3><p>${e.message}</p></div></div>`;
        btn.disabled = true;
        btn.textContent = '开始分析';
      }
    }

    async function startAnalyze() {
      if (!currentReportId) {
        alert('请先上传文件');
        return;
      }

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.textContent = '准备中...';

      const resultDiv = document.getElementById('analysisResult');

      try {
        // 1. 检查文档是否处理完成
        resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在检查文档状态...</div>';

        let status = 'processing';
        let attempts = 0;
        while (status === 'processing' && attempts < 60) {
          await sleep(500);
          const statusRes = await fetch(`${API_BASE}/api/report/${currentReportId}`);
          const statusData = await statusRes.json();
          if (statusData.success) {
            status = statusData.report.status;
            attempts++;
            if (status === 'processing') {
              resultDiv.innerHTML = `<div class="loading"><div class="spinner"></div>正在处理文档... (${attempts * 0.5}s)</div>`;
            }
          } else {
            break;
          }
        }

        if (status !== 'processed') {
          resultDiv.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">⚠️</div><h3>文档处理超时</h3><p>请稍后重试</p></div></div>`;
          btn.disabled = false;
          btn.textContent = '开始分析';
          return;
        }

        // 2. 执行分析
        btn.textContent = '分析中...';
        resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在分析中...</div>';

        const analyzeRes = await fetch(`${API_BASE}/api/report/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            report_id: currentReportId,
            query: '分析报告内容，提取报告标题和关键词，列出涉及的A股标的和行业板块，说明利好还是利空',
            use_knowledge_base: false,
            use_rag: false,
            top_k: 5
          })
        });
        const analyzeData = await analyzeRes.json();

        if (analyzeData.success) {
          renderAnalysisResults(analyzeData);
          loadAnalysisHistory();
          // 滚动到结果区域
          resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
          // 显示返回顶部按钮
          showBackToTopButton();
        } else {
          resultDiv.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">❌</div><h3>分析失败</h3><p>${analyzeData.error || '未知错误'}</p></div></div>`;
        }
      } catch (e) {
        resultDiv.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">❌</div><h3>请求异常</h3><p>${e.message}</p></div></div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '开始分析';
      }
    }

    async function processKnowledge(kbId) {

        const res = await fetch(`${API_BASE}/api/report/knowledge/${kbId}/process`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          // 轮询状态

        } else {
          alert('解析失败: ' + (data.detail || '未知错误'));

    function pollKnowledgeStatus(kbId) {
      const check = async () => {
        try {
          // 同时获取状态和进度
          const [statusRes, progressRes] = await Promise.all([
            fetch(`${API_BASE}/api/report/knowledge/list?limit=50`),
            fetch(`${API_BASE}/api/report/knowledge/${kbId}/progress`)
          ]);
          const statusData = await statusRes.json();
          const progressData = await progressRes.json();

          if (statusData.success) {
            const item = statusData.items.find(i => i._id === kbId);
            if (item) {
              const idx = kbList.findIndex(i => i._id === kbId);
              if (idx !== -1) {
                // 保存之前的进度信息
                const prevProgress = kbList[idx]._progress;
                kbList[idx] = item;
                // 恢复进度信息
                if (progressData.progress) {
                  kbList[idx]._progress = progressData.progress;
                } else if (prevProgress && item.status === 'processing') {
                  kbList[idx]._progress = prevProgress;
                }
                renderKnowledgeList();
              }
              if (item.status === 'processing') {
                setTimeout(check, 1000);
              } else if (item.status === 'indexed') {
                // 解析完成
              } else if (item.status === 'failed') {
                // 解析失败
              }
            }
          }
        } catch (e) { console.error('检查状态失败:', e); }
      };
      setTimeout(check, 1000);
    }

    // 清理markdown格式和多余空行（用于纯文本场景）
    function cleanMarkdown(text) {
      if (!text) return '';
      // 移除 HTML 标签（保留标签内文本）
      text = text.replace(/<[^>]+>/g, '');
      // 移除 markdown 表格
      text = text.replace(/\|[^\n]*\|/g, '');
      // 移除 ### ## # 标题标记（保留标题文字）
      text = text.replace(/^#{1,6}\s+(.+)$/gm, '$1');
      // 移除 ** 粗体
      text = text.replace(/\*\*/g, '');
      // 移除 * 斜体
      text = text.replace(/\*/g, '');
      // 移除 ` 行内代码
      text = text.replace(/`/g, '');
      // 移除 --- 等分隔线
      text = text.replace(/^[-*_]{3,}$/gm, '');
      // 移除 > 引用
      text = text.replace(/^>\s*/gm, '');
      // 移除 - + * 列表标记（保留内容）
      text = text.replace(/^[-+*]\s+/gm, '');
      // 移除行首的数字编号列表标记（保留内容）
      text = text.replace(/^\d+\.\s+/gm, '');
      // 将多个连续换行合并为单个换行（段落分隔）
      text = text.replace(/\n{3,}/g, '\n');
      // 移除只有空白字符的行
      text = text.split('\n').map(line => line.trim()).filter(line => line.length > 0).join('\n');
      return text.trim();
    }

    // 渲染后端返回的内容（可能是 HTML 或 markdown 混合）
    function renderMarkdown(text) {
      if (!text) return '';
      // 移除危险标签
      text = text.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');
      text = text.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
      // 把 markdown 粗体 **text** 转为 <strong>text</strong>
      text = text.replace(/\*\*(.+?)\*\*/g, '__strong__$1__/strong__');
      // 把 markdown 斜体 *text* 转为 <em>text</em>
      text = text.replace(/\*([^*\n]+?)\*/g, '__em__$1__/em__');
      // 把剩余的单个 * 移除
      text = text.replace(/\*/g, '');
      // 恢复 strong 和 em
      text = text.replace(/__strong__/g, '<strong>').replace(/__\/strong__/g, '</strong>');
      text = text.replace(/__em__/g, '<em>').replace(/__\/em__/g, '</em>');
      // 把 markdown 分隔线转为 <hr>
      text = text.replace(/^[-*_]{3,}$/gm, '<hr>');
      // 把 markdown 引用 > text 转为 <blockquote>
      text = text.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      // 把 - text 或 * text 列表项标记移除（保留内容）
      text = text.replace(/^[-*+] (.+)$/gm, '• $1');
      text = text.replace(/^(\d+)\. (.+)$/gm, '$1. $2');
      // 把 ``` 包裹的代码块移除
      text = text.replace(/```[\s\S]*?```/g, '');
      // 移除剩余的 ` 行内代码
      text = text.replace(/`([^`]+)`/g, '$1');
      // 把纯文本按段落分割处理
      const blocks = text.split(/\n{2,}/);
      const rendered = blocks.map(block => {
        block = block.trim();
        if (!block) return '';
        // 如果是已经是 HTML 标签（标题、列表、表格、blockquote、hr），直接返回
        if (block.match(/^<(h[1-6]|ul|ol|li|table|thead|tbody|tr|th|td|blockquote|hr)(?:\s|>|>)/i)) {
          // 标题里的 # 也要清理
          block = block.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
          block = block.replace(/^### (.+)$/gm, '<h3>$1</h3>');
          block = block.replace(/^## (.+)$/gm, '<h3>$1</h3>');
          block = block.replace(/^# (.+)$/gm, '<h2>$1</h2>');
          return block;
        }
        // 纯文本段落用 <p> 包裹，并把单换行转为 <br>
        // 先处理段落内的标题 # 标记
        block = block.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
        block = block.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        block = block.replace(/^## (.+)$/gm, '<h3>$1</h3>');
        block = block.replace(/^# (.+)$/gm, '<h2>$1</h2>');
        // 如果转化后变成了标题标签，直接返回
        if (block.match(/^<h[1-6]/)) return block;
        // 单换行转为 <br>（让诗歌/短句也分行显示）
        block = block.replace(/\n/g, '<br>');
        return `<p>${block}</p>`;
      }).filter(Boolean);
      return rendered.join('\n');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToTop() {
      document.querySelector('.right-panel').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showBackToTopButton() {
      const btn = document.getElementById('backToTopBtn');
      btn.style.display = 'block';
    }

    function hideBackToTopButton() {
      const btn = document.getElementById('backToTopBtn');
      btn.style.display = 'none';
    }

    // ========== 初始化 ==========
    loadAnalysisHistory();
    loadKnowledge();
  </script>
</body>
</html>
