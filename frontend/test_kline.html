<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>K线测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div id="chart" style="width: 800px; height: 600px;"></div>
    <div id="debug" style="margin-top: 20px; font-family: monospace;"></div>

    <script>
        // 模拟后端返回的数据
        const klines = [
            {date: "2026-03-23", open: 10.68, close: 10.45, high: 10.68, low: 10.43, volume: 1580088},
            {date: "2026-03-24", open: 10.52, close: 10.88, high: 10.89, low: 10.52, volume: 1622251},
            {date: "2026-03-25", open: 10.89, close: 10.94, high: 10.95, low: 10.79, volume: 744780},
            {date: "2026-03-26", open: 10.91, close: 10.94, high: 11.05, low: 10.9, volume: 827664},
            {date: "2026-03-27", open: 10.91, close: 11.02, high: 11.05, low: 10.83, volume: 773300}
        ];

        // 准备数据
        const dates = klines.map(k => k.date);
        const values = klines.map(k => [k.open, k.close, k.low, k.high]);

        document.getElementById('debug').innerHTML = '<h3>dates数组:</h3>' + JSON.stringify(dates) +
            '<br><h3>values数组:</h3>' + JSON.stringify(values, null, 2);

        // 计算成交量
        const volumns = [];
        for (let i = 0; i < klines.length; i++) {
            const close = klines[i].close;
            const prevClose = i > 0 ? klines[i-1].close : close;
            let flag = close > prevClose ? 1 : -1;
            const vol = parseInt(klines[i].volume) || 0;
            volumns.push([i, vol / 10000, flag]);
        }

        // 初始化图表
        const chart = echarts.init(document.getElementById('chart'));

        const option = {
            animation: false,
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross' },
                formatter: function(params) {
                    const debug = document.getElementById('debug');
                    debug.innerHTML = '<h3>Tooltip params:</h3>' +
                        '<pre>' + JSON.stringify(params, null, 2) + '</pre>' +
                        '<h3>params[0] detail:</h3>' +
                        '<pre>' + JSON.stringify({
                            seriesName: params[0]?.seriesName,
                            seriesType: params[0]?.seriesType,
                            dataIndex: params[0]?.dataIndex,
                            data: params[0]?.data,
                            value: params[0]?.value,
                            rawData: params[0]?.rawData,
                            axisValue: params[0]?.axisValue
                        }, null, 2) + '</pre>';

                    const candi = params[0];
                    if (!candi) return '';

                    // ECharts candlestick数据格式: [open, close, low, high]
                    let open, close, low, high;
                    const val = candi.value;
                    if (val && Array.isArray(val) && val.length >= 4) {
                        open = val[0]; close = val[1]; low = val[2]; high = val[3];
                    } else if (candi.data && Array.isArray(candi.data) && candi.data.length >= 4) {
                        open = candi.data[0]; close = candi.data[1]; low = candi.data[2]; high = candi.data[3];
                    } else {
                        return '数据格式: ' + JSON.stringify(val);
                    }

                    return candi.axisValue + '<br>' +
                        '开盘:' + parseFloat(open).toFixed(2) + '<br>' +
                        '收盘:' + parseFloat(close).toFixed(2) + '<br>' +
                        '最低:' + parseFloat(low).toFixed(2) + '<br>' +
                        '最高:' + parseFloat(high).toFixed(2);
                }
            },
            xAxis: [{ type: 'category', data: dates, boundaryGap: false }],
            yAxis: [{ scale: true }],
            series: [{
                name: '日K',
                type: 'candlestick',
                data: values,
                itemStyle: { color: '#ec0000', color0: '#00da3c' }
            }, {
                name: '成交量(手)',
                type: 'bar',
                data: volumns
            }]
        };

        chart.setOption(option);
    </script>
</body>
</html>
